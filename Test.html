<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=Inter:wght@200;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --font-display: 'Chakra Petch', sans-serif;
  --font-content: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --accent: #4de8b8;
  --accent-rgb: 77, 232, 184;
  --bg: #08090c;
  --safe-top: env(safe-area-inset-top, 20px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body { 
    background: var(--bg); 
    color: #fff; 
    font-family: var(--font-content); 
    height: 100dvh; 
    overflow: hidden; 
    letter-spacing: -0.015em;
    -webkit-font-smoothing: antialiased;
}

canvas#bg-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* APPLE MATERIAL DESIGN */
.apple-glass {
  background: rgba(20, 22, 26, 0.45);
  backdrop-filter: blur(35px) saturate(210%) brightness(110%);
  -webkit-backdrop-filter: blur(35px) saturate(210%) brightness(110%);
  border: 0.5px solid rgba(255, 255, 255, 0.15);
  border-radius: 28px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.card {
  width: 100vw; height: 100dvh;
  display: flex; flex-direction: column;
  perspective: 1200px;
  position: relative; z-index: 10;
}

.trap-head {
  height: 14dvh; padding-top: var(--safe-top);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.hdr-title { font-family: var(--font-display); font-weight: 700; font-size: clamp(18px, 2.5vw, 24px); letter-spacing: 0.2em; text-transform: uppercase; }

.body-grid {
  flex: 1; display: grid; grid-template-columns: 1fr 400px;
  gap: 25px; padding: 0 5vw 40px; min-height: 0;
}

.map-panel { position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
#rj { width: 95%; height: 95%; }

.dist { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.12); cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.dist:hover { fill: rgba(var(--accent-rgb), 0.15); stroke: rgba(255,255,255,0.3); }
.dist.on { fill: rgba(var(--accent-rgb), 0.25)!important; stroke: var(--accent)!important; stroke-width: 2px!important; }

.state-boundary { fill: none; stroke: rgba(255,255,255,0.4); stroke-width: 1px; pointer-events: none; }

.right-panel { display: flex; flex-direction: column; gap: 20px; min-height: 0; }
.data-blk { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.blk-header { padding: 20px 24px 10px; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.15em; }

.topper-list {
  flex: 1; overflow-y: auto; padding: 0 16px 40px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
  -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
}
.topper-list::-webkit-scrollbar { display: none; }

.row { padding: 16px; border-radius: 18px; margin-bottom: 4px; transition: 0.2s; cursor: pointer; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
.row:active { background: rgba(255, 255, 255, 0.1); transform: scale(0.98); }
.row b { color: var(--accent); display: block; font-size: 14px; margin-bottom: 4px; }
.row span { color: rgba(255,255,255,0.6); font-size: 13px; line-height: 1.4; }

@media (max-width: 900px) {
    .body-grid { grid-template-columns: 1fr; }
    .right-panel { height: 50dvh; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="card" id="stage">
  <div class="trap-head">
    <div class="hdr-title">ALLEN SIKAR <span style="color:var(--accent)">TOPPER ATLAS</span></div>
  </div>

  <div class="body-grid">
    <div class="map-panel apple-glass" id="map-viewport">
      <svg id="rj" viewBox="0 0 500 520"></svg>
    </div>

    <div class="right-panel">
      <div class="data-blk apple-glass">
        <div class="blk-header">Medical Legends</div>
        <div class="topper-list" id="med-list"></div>
      </div>
      <div class="data-blk apple-glass">
        <div class="blk-header">Engineering Legends</div>
        <div class="topper-list" id="eng-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   STEP 1: PASTE YOUR DATA BLOCKS HERE
   ═══════════════════════════════════════════════════════ */

// 1. DISTRICT GEOJSON
const districtGJ = {
  "type": "FeatureCollection",
  "features": [
    // Paste your district features here
    {"type":"Feature","properties":{"district":"Barmer"},"geometry":{"type":"Polygon","coordinates":[[[70.0,24.5],[72.0,24.5],[72.0,26.5],[70.0,26.5],[70.0,24.5]]]}},
    {"type":"Feature","properties":{"district":"Jalore"},"geometry":{"type":"Polygon","coordinates":[[[71.1,24.5],[73.0,24.5],[73.0,25.8],[71.1,25.8],[71.1,24.5]]]}}
  ]
};

// 2. STATE GEOJSON
const stateGJ = {
  "type": "FeatureCollection",
  "features": [
    // Paste your state boundaries here
    {"type":"Feature","properties":{"state":"Rajasthan"},"geometry":{"type":"Polygon","coordinates":[[[69.5,23.3],[78.2,23.3],[78.2,30.1],[69.5,30.1],[69.5,23.3]]]}}
  ]
};

// 3. FACT BASE (Topper Data)
const DATA = {
  "Barmer": {
    m: ["<b>Deraj Ram</b>: AIR 285 → AIIMS Jodhpur ('25)", "<b>17 Allenites</b> scored 600+ in NEET"],
    e: ["<b>Vineet Jatol</b>: IIT Ropar CS ('25)"]
  },
  "Jalore": {
    m: ["<b>Jeevika Choudhary</b>: AIR 2,310 ('23)"],
    e: ["<b>Ankita Verma</b>: IIT Bombay EE ('24)"]
  }
};

/* ═══════════════════════════════════════════════════════
   STEP 2: THE RENDER ENGINE (Original Logic + Apple UI)
   ═══════════════════════════════════════════════════════ */

const svg = document.getElementById('rj');

function renderMap() {
    // Determine Bounding Box
    let x0=Infinity, x1=-Infinity, y0=Infinity, y1=-Infinity;
    districtGJ.features.forEach(f => {
        f.geometry.coordinates.flat(Infinity).forEach((v, i) => {
            if(i%2===0) { if(v<x0)x0=v; if(v>x1)x1=v; }
            else { if(v<y0)y0=v; if(v>y1)y1=v; }
        });
    });

    const sc = Math.min(460/(x1-x0), 480/(y1-y0));
    const px = lo => 20 + (lo - x0) * sc;
    const py = la => 500 - (la - y0) * sc;

    const ringToD = ring => ring.map((pt, i) => (i?'L':'M') + px(pt[0]).toFixed(1) + ',' + py(pt[1]).toFixed(1)).join('') + 'Z';

    // Draw Districts
    districtGJ.features.forEach(f => {
        const name = f.properties.district;
        const d = f.geometry.coordinates.map(ringToD).join(' ');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('class', 'dist');
        path.setAttribute('d', d);
        path.onclick = () => select(name, path);
        svg.appendChild(path);
    });

    // Draw State Boundaries
    stateGJ.features.forEach(f => {
        const d = f.geometry.coordinates.map(ringToD).join(' ');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('class', 'state-boundary');
        path.setAttribute('d', d);
        svg.appendChild(path);
    });
}

function select(name, el) {
    document.querySelectorAll('.dist').forEach(p => p.classList.remove('on'));
    el.classList.add('on');
    
    const d = DATA[name] || {m:[], e:[]};
    document.getElementById('med-list').innerHTML = d.m.map(t => `<div class="row"><span>${t}</span></div>`).join('');
    document.getElementById('eng-list').innerHTML = d.e.map(t => `<div class="row"><span>${t}</span></div>`).join('');
}

/* ═══════════════════════════════════════════════════════
   STEP 3: APPLE INTERACTION & BACKGROUND
   ═══════════════════════════════════════════════════════ */
const stage = document.getElementById('stage');
document.addEventListener('mousemove', (e) => {
    const x = (window.innerWidth / 2 - e.pageX) / 85;
    const y = (window.innerHeight / 2 - e.pageY) / 85;
    stage.style.transform = `rotateX(${-y}deg) rotateY(${x}deg)`;
});

// Simple Starfield Background
function initStars() {
    const c = document.getElementById('bg-canvas');
    const ctx = c.getContext('2d');
    let w, h, stars = [];
    const resize = () => { w = c.width = window.innerWidth; h = c.height = window.innerHeight; };
    window.onresize = resize; resize();
    for(let i=0; i<100; i++) stars.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.2});
    function anim() {
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill(); });
        requestAnimationFrame(anim);
    }
    anim();
}

window.onload = () => {
    renderMap();
    initStars();
    // Default Selection
    const first = document.querySelector('.dist');
    if(first) first.click();
};
</script>
</body>
</html>
